<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación XV</title>

<!-- WhatsApp preview -->
<meta property="og:title" content="Invitación XV Danna Camila" />
<meta property="og:description" content="Estás invitado a una noche mágica ✨" />
<meta property="og:image" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg" />
<meta property="og:url" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.html" />

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050816;
  font-family:'Playfair Display', serif;
  overflow:hidden;
}

/* ⭐ CAPA DE ESTRELLAS */
.estrellas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
}

.estrella{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation: caer linear infinite;
}

/* animación caída */
@keyframes caer{
  from{
    transform:translateY(-10px);
    opacity:0;
  }
  to{
    transform:translateY(100vh);
    opacity:1;
  }
}

/* tarjeta */
.card{
  width:360px;
  height:520px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);

  opacity:0;
  transform:scale(0.95);
  animation: aparecer 1s ease forwards;
}

/* animación tarjeta */
@keyframes aparecer{
  to{
    opacity:1;
    transform:scale(1);
  }
}

/* imagen */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
}

/* contenido */
.content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

/* textos */
.de, .para{
  font-size:15px;
  letter-spacing:3px;
}

.para{
  margin-top:10px;
}

/* nombre elegante */
.nombre{
  margin-top:10px;
  font-size:34px;
  font-family:'Great Vibes', cursive;
}
</style>
</head>

<body>

<!-- ⭐ GENERADOR DE ESTRELLAS -->
<div class="estrellas" id="estrellas"></div>

<div class="card">

  <img src="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg">

  <div class="overlay"></div>

  <div class="content">
    <div class="de">DE: Camila Barrera</div>
    <div class="para">PARA</div>
    <div class="nombre" id="nombre">Invitado</div>
  </div>

</div>

<script>
// nombre dinámico
const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

if(nombre){
  document.getElementById("nombre").textContent = nombre;
}

// ⭐ crear estrellitas
const contenedor = document.getElementById("estrellas");

for(let i=0; i<30; i++){
  const estrella = document.createElement("div");
  estrella.classList.add("estrella");

  estrella.style.left = Math.random() * 100 + "vw";
  estrella.style.animationDuration = (3 + Math.random() * 5) + "s";
  estrella.style.opacity = Math.random();

  contenedor.appendChild(estrella);
}
</script>

</body>
</html
