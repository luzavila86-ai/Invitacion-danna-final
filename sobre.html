<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación XV</title>

<meta property="og:title" content="Invitación XV Danna Camila" />
<meta property="og:description" content="Estás invitado a una noche mágica ✨" />
<meta property="og:image" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg" />
<meta property="og:url" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.html" />

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050816;
  font-family:Arial;
}

.card{
  width:320px;
  height:480px;
  background:white;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{
  font-size:24px;
}

button{
  margin-top:20px;
  padding:10px 20px;
}
</style>
</head>

<body>

<div class="card">
  <h1 id="nombre">Invitado</h1>
  <button onclick="abrir()">Abrir</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

if(nombre){
  document.getElementById("nombre").textContent = nombre;
}

function abrir(){
  window.location.href = "https://luzavila86-ai.github.io/Invitacion-danna-final/";
}
</script>

</body>
</html>
