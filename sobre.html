<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación XV</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050816;
  font-family: Arial, sans-serif;
}

.card{
  width:360px;
  height:520px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  background:#0b1a3a;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

.content{
  position:relative;
  z-index:2;
  text-align:center;
}

h1{
  font-size:28px;
  margin:10px 0;
}

button{
  margin-top:15px;
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:white;
  color:#050816;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

  <img src="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg">

  <div class="overlay"></div>

  <div class="content">

    <h1 id="nombre">Invitado</h1>

    <button onclick="abrir()">Abrir invitación</button>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

if(nombre){
  document.getElementById("nombre").textContent = nombre;
}

function abrir(){
  window.location.href = "https://luzavila86-ai.github.io/Invitacion-danna-final/";
}
</script>

</body>
</html>
