body{

body::before{
  content:"";
  position:absolute;
  inset:0;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity:0.15;
  pointer-events:none;
}

/* 💌 tarjeta */
.card{
  width:360px;
  height:520px;
  border-radius:22px;
  overflow:hidden;
  position:relative;
  background:url("https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg");
  background-size:cover;
  background-position:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
  animation: appear 1s ease forwards;
}

/* animación entrada */
@keyframes appear{
  from{opacity:0; transform:scale(0.85)}
  to{opacity:1; transform:scale(1)}
}

/* overlay oscuro */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(5,8,22,0.85));
}

/* contenido */
.content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
}
