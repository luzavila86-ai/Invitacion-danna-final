<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación XV</title>

<!-- WhatsApp preview -->
<meta property="og:title" content="Invitación XV Danna Camila" />
<meta property="og:description" content="Estás invitado a una noche mágica ✨" />
<meta property="og:image" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg" />
<meta property="og:url" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.html" />

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050816;
  font-family: Georgia, serif;
}

/* tarjeta */
.card{
  width:360px;
  height:520px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* imagen */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
}

/* contenido */
.content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

/* texto uniforme */
.de, .para{
  font-size:14px;
  letter-spacing:2px;
}

.para{
  margin-top:10px;
  letter-spacing:4px;
}

.nombre{
  margin-top:10px;
  font-size:28px;
}
</style>
</head>

<body>

<div class="card">

  <img src="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg">

  <div class="overlay"></div>

  <div class="content">

    <div class="de">DE: Camila Barrera</div>

    <div class="para">PARA</div>

    <div class="nombre" id="nombre">Invitado</div>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

if(nombre){
  document.getElementById("nombre").textContent = nombre;
}
</script>

</body>
</html>
