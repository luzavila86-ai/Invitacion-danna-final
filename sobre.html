<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050816;
  overflow:hidden;
  font-family:'Great Vibes', cursive;
}

/* ⭐ estrellas */
.estrellas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

.estrella{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation: caer linear infinite;
}

@keyframes caer{
  from{
    transform:translateY(-10px);
    opacity:0;
  }
  to{
    transform:translateY(100vh);
    opacity:1;
  }
}

/* tarjeta */
.card{
  width:360px;
  height:520px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* imagen */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
}

/* contenido */
.content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

/* todo uniforme */
.de, .para, .nombre{
  font-family:'Great Vibes', cursive;
}

/* tamaños */
.de{
  font-size:26px;
}

.para{
  margin-top:10px;
  font-size:26px;
}

.nombre{
  margin-top:10px;
  font-size:38px;
}
</style>
</head>
