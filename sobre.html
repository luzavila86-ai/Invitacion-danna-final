<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación XV</title>

<meta property="og:title" content="Invitación XV Danna Camila" />
<meta property="og:description" content="Estás invitado a una noche mágica ✨" />
<meta property="og:image" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg" />
<meta property="og:url" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.html" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap');

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #0b1a3a, #050816 70%);
  font-family:'Playfair Display', serif;
  overflow:hidden;
}

/* estrellas */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity:0.15;
  pointer-events:none;
}

/* tarjeta */
.card{
  width:360px;
  height:520px;
  border-radius:22px;
  overflow:hidden;
  position:relative;
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
  animation: appear 1s ease forwards;
}

/* animación */
@keyframes appear{
  from{opacity:0; transform:scale(0.85)}
  to{opacity:1; transform:scale(1)}
}

/* imagen de fondo como respaldo */
.card img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* overlay oscuro */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(5,8,22,0.85));
  z-index:1;
}

/* contenido */
.content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
  z-index:2;
}

/* texto */
small{
  font-size:14px;
  opacity:0.9;
}

.para{
  font-size:12px;
  letter-spacing:3px;
  opacity:0.85;
  margin-top:10px;
}

h1{
  font-size:32px;
  font-weight:500;
  margin:10px 0;
}

button{
  margin-top:22px;
  padding:12px 24px;
  background:white;
  color:#050816;
  border:none;
  border-radius:30px;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

  <!-- 🔥 imagen de respaldo (esto evita pantalla sin imagen) -->
  <img src="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg" alt="sobre">

  <div class="overlay"></div>

  <div class="content">

    <small>DE: Camila Barrera</small>

    <div class="para">PARA</div>

    <h1 id="nombre">Invitado</h1>

    <button onclick="abrir()">Abrir invitación ✉️</button>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

if(nombre){
  document.getElementById("nombre").textContent = nombre;
}

function abrir(){
  window.location.href = "https://luzavila86-ai.github.io/Invitacion-danna-final/";
}
</script>

</body>
</html>
