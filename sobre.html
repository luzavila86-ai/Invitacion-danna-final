<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación XV</title>

<!-- Vista previa WhatsApp -->
<meta property="og:title" content="Invitación XV Danna Camila" />
<meta property="og:description" content="Estás invitado a una noche mágica ✨" />
<meta property="og:image" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg" />
<meta property="og:url" content="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.html" />

<!-- Fuente elegante -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050816;
  overflow:hidden;
  font-family:'Great Vibes', cursive;
}

/* tarjeta */
.card{
  width:360px;
  height:520px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  animation: respirar 6s ease-in-out infinite;
}

/* zoom suave */
@keyframes respirar{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.02); }
}

/* imagen */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
}

/* brillo elegante */
.brillo{
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
  transform:skewX(-20deg);
  animation: brillo 6s infinite;
}

@keyframes brillo{
  0%{ left:-100%; }
  100%{ left:130%; }
}

/* contenido */
.content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

/* textos */
.de, .para, .nombre{
  font-family:'Great Vibes', cursive;
}

.de{
  font-size:26px;
}

.para{
  margin-top:10px;
  font-size:26px;
}

.nombre{
  margin-top:10px;
  font-size:38px;
}

/* botón */
button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:white;
  color:#050816;
  font-size:18px;
  font-family:'Great Vibes', cursive;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">

  <!-- imagen -->
  <img src="https://luzavila86-ai.github.io/Invitacion-danna-final/sobre.jpg">

  <div class="overlay"></div>

  <div class="brillo"></div>

  <div class="content">

    <div class="de">De: Camila Barrera</div>

    <div class="para">Para:</div>

    <div class="nombre" id="nombre">Invitado</div>

    <button onclick="abrir()">Abrir invitación ✉️</button>

  </div>

</div>

<script>
// nombre dinámico
const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");

if(nombre && nombre.trim() !== ""){
  document.getElementById("nombre").textContent = nombre;
}

// botón
function abrir(){
  window.location.href = "https://luzavila86-ai.github.io/Invitacion-danna-final/";
}
</script>

</body>
</html>
