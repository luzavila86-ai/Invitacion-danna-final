<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis 15 Años - Danna Camila</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/*   PORTADA */
#portada {
    width: 100%;
    height: 100vh;
    position: relative;
    background: black;
}

#videoPrincipal {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BOTÓN ENTRAR */
.btn-entrar {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: gold;
    color: black;
    padding: 14px 28px;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
}

/*   INVITACIÓN */
#invitacion {
    display: none;
    width: 100%;
    min-height: 100vh;
    background: url('fondo6.jpg') no-repeat center center;
    background-size: cover;
    position: relative;
}

/* OVERLAY OSCURO */
#invitacion::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 0;
}

/* CONTENIDO */
.contenido {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px 20px;
}

/* FOTO */
.foto {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 5px solid gold;
    object-fit: cover;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

/* TEXTOS */
h1, p {
    color: white;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
}

h2 {
    color: gold;
    font-size: 40px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
}

/* BOTONES */
.boton {
    display: inline-block;
    margin: 10px;
    padding: 12px 22px;
    background: gold;
    color: black;
    border-radius: 25px;
    text-decoration: none;
    font-weight: bold;
}

/*   BOTÓN AUDIO */
#audioBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: gold;
    color: black;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 999;
}

/*   COUNTDOWN */
#countdown {
    font-size: 22px;
    color: gold;
    margin-top: 15px;
}

/*   QR */
.qr-box {
    margin-top: 20px;
}

.qr-box img {
    width: 150px;
    border-radius: 10px;
    border: 3px solid gold;
}

/*   SOBRES ANIMADOS */
.sobre {
    position: fixed;
    top: -20px;
    font-size: 20px;
    animation: caer linear forwards;
    opacity: 0.8;
    z-index: 1;
}

@keyframes caer {
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!--   AUDIO -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!--   PORTADA -->
<div id="portada">

    <video autoplay muted playsinline loop id="videoPrincipal">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="btn-entrar" onclick="entrar()">
        Entrar
    </div>

</div>

<!--   INVITACIÓN -->
<div id="invitacion">

<div class="contenido">

    <h1>Mis 15 Años</h1>

    <img src="danna.jpg" class="foto">

    <h2>DANNA CAMILA</h2>

    <p>1 de agosto de 2026 - 7:00 PM</p>

    <p>Bosa Centro - Casa Claret</p>

    <!--   COUNTDOWN -->
    <div id="countdown"></div>

    <!-- BOTONES -->
    <a class="boton" href="https://maps.google.com" target="_blank">Ver ubicación</a>
    <a class="boton" href=" https://forms.gle/1TE7DMvjLagUnAVj9" target="_blank">Confirmar asistencia</a>

    <!--   QR ALBUM -->
   <div class="qr-box">
    <p>Álbum de fotos 📷</p>

    <a href="https://photos.app.goo.gl/quPGHUCvF335gAPu9"_blank">
        <img src="qr.jpg" alt="QR álbum de fotos">
    </a>

    <br>

    <a class="boton" href="https://TU-LINK-DE-GOOGLE-FOTOS" target="_blank">
        Abrir álbum de fotos
    </a>
</div>

</div>

<!--   AUDIO BTN -->
<div id="audioBtn" onclick="toggleAudio()"> </div>

<script>
const musica = document.getElementById("musica");
let activo = false;

/*   ENTRAR */
function entrar() {
    document.getElementById("portada").style.display = "none";
    document.getElementById("invitacion").style.display = "block";

    function entrar() {
    document.getElementById("portada").style.display = "none";
    document.getElementById("invitacion").style.display = "block";

    setTimeout(() => {
        musica.play().catch(()=>{});
        activo = true;
        document.getElementById("audioBtn").innerHTML = "🔊";
    }, 300);
}
    
    activo = true;
    document.getElementById("audioBtn").innerHTML = " ";

    iniciarSobres();
    iniciarCuentaRegresiva();
}

/*   AUDIO */
function toggleAudio() {
    if (activo) {
        musica.pause();
        activo = false;
        document.getElementById("audioBtn").innerHTML = " ";
    } else {
        musica.play();
        activo = true;
        document.getElementById("audioBtn").innerHTML = " ";
    }
}

/*   COUNTDOWN */
function iniciarCuentaRegresiva() {
    const fecha = new Date("2026-08-01T19:00:00").getTime();

    setInterval(() => {
        let ahora = new Date().getTime();
        let distancia = fecha - ahora;

        let dias = Math.floor(distancia / (1000*60*60*24));
        let horas = Math.floor((distancia % (1000*60*60*24))/(1000*60*60));
        let minutos = Math.floor((distancia % (1000*60*60))/(1000*60));
        let segundos = Math.floor((distancia % (1000*60))/1000);

        document.getElementById("countdown").innerHTML =
        `  ${dias}d ${horas}h ${minutos}m ${segundos}s`;
    }, 1000);
}

/*   SOBRES */
function iniciarSobres() {
    setInterval(() => {
        let sobre = document.createElement("div");
        sobre.classList.add("sobre");
        sobre.innerHTML = " ";
        sobre.style.left = Math.random() * window.innerWidth + "px";
        sobre.style.animationDuration = (3 + Math.random() * 3) + "s";
        document.body.appendChild(sobre);

        setTimeout(() => {
            sobre.remove();
        }, 6000);
    }, 400);
}
</script>

</body>
</html>
