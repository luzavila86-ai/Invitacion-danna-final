<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 Años - DANNA CAMILA</title>

<!-- Fuente elegante -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background-image: url('fondo.jpg'); /* Imagen de fondo */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color: white;
  text-align: center;
}

/* Contenedor principal */
.contenedor {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Texto superior */
h2 {
  color: #FFD700;
  font-size: 28px;
  margin-bottom: 20px;
  text-shadow: 0px 0px 10px rgba(255,215,0,0.8);
}

/* Foto principal */
.foto-principal {
  width: 220px;
  height: 220px;
  object-fit: cover;

  border-radius: 50%;
  border: 5px solid #FFD700;

  box-shadow: 0px 0px 25px rgba(255,215,0,0.6);

  margin-bottom: 20px;
}

/* Efecto al pasar el mouse */
.foto-principal:hover {
  transform: scale(1.05);
  transition: 0.3s;
}

/* Nombre */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 55px;
  color: #FFD700;
  margin: 10px 0;

  text-shadow:
    2px 2px 0px #c9a000,
    4px 4px 10px rgba(0,0,0,0.7);
}

/* Apellido */
.apellido {
  letter-spacing: 3px;
  font-size: 14px;
  opacity: 0.9;
}
</style>

</head>

<body>

<div class="contenedor">

  <h2>Mis 15 Años</h2>

  <!-- FOTO DE TU HIJA -->
  <img src="danna.jpg" class="foto-principal">

  <h1>DANNA CAMILA</h1>
  <p class="apellido">BARRERA AVILA</p>

</div>

</body>
</html>
